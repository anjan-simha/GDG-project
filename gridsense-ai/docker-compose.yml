version: "3.9"

# ─────────────────────────────────────────────────────
# GridSense AI — Local Development (SQLite)
# Run:  docker-compose up --build
# ─────────────────────────────────────────────────────
services:
  backend:
    build: ./backend
    container_name: gridsense_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite:///./gridsense.db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: gridsense_frontend
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
