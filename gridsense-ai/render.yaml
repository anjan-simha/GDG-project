services:
  # ──────────────────────────────────────────
  # Backend — FastAPI (Docker)
  # ──────────────────────────────────────────
  - type: web
    name: gridsense-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./gridsense.db
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: INFO
      - key: SYNTHETIC_DATA_BANNER
        value: "true"
      - key: LLM_ENABLED
        value: "true"
      - key: LLM_MOCK_MODE
        value: "false"
      - key: GEMINI_API_KEY
        sync: false

  # ──────────────────────────────────────────
  # Frontend — React/Vite (Static Site)
  # ──────────────────────────────────────────
  - type: static
    name: gridsense-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # No 'plan' needed for static sites
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: gridsense-backend
          type: web
          property: host
